<!doctype html>
<html lang="ru">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">

    <title>
        {% if title %}
          {{ title }}
        {% else %}
          Лабораторная работа №1
        {% endif %}
    </title>
  </head>
  <body>
    <header>
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
            <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
    <li class="nav-item">
        <a class="nav-link" href="{{ url_for('index') }}">Задание</a>
    </li>
    <li class="nav-item">
        <a class="nav-link" href="{{ url_for('posts') }}">Посты</a>
    </li>
    <li class="nav-item">
        <a class="nav-link" href="{{ url_for('request_info') }}">Данные запроса</a>
    </li>
    <li class="nav-item">
        <a class="nav-link" href="{{ url_for('auth') }}">Авторизация</a>
    </li>
    <li class="nav-item">
        <a class="nav-link" href="{{ url_for('phone') }}">Проверка телефона</a>
    </li>
    <li class="nav-item">
        <a class="nav-link" href="{{ url_for('about') }}">Об авторе</a>
    </li>
</ul>
          </nav>
    </header>

    <main class="my-3">
        <div class="container">
            {% block content %}
                <h1>Содержимое по умолчанию</h1>
            {% endblock %}
        </div>
    </main>

    <footer class="bg-dark text-white mt-5 py-4">
        <div class="container">
            <div class="row">
                <div class="col text-center">
                    <p class="mb-0">
                        &copy; 2026 - Чернов Владимир | Группа: 241-326
                    </p>
                    <p class="mb-0 small">
                        Веб-разработка, лабораторная работа №1
                    </p>
                </div>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    <script src="{{ url_for('static', filename='main.js') }}" defer></script>

  </body>
</html>
